<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Garden</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Courier New',monospace; display:flex; flex-direction:column; align-items:center; padding:14px 12px 20px; min-height:100vh; transition:background 2s ease,color 2s ease; color-scheme:dark; }
body.day   { background:linear-gradient(180deg,#87ceeb 0%,#c8e6c9 60%,#a5d6a7 100%); color:#1a3a1a; }
body.night { background:linear-gradient(180deg,#0a0a1a 0%,#0a1a0a 60%,#0a0f0a 100%); color:#e6edf3; }
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0;transition:opacity 2s;}
body.night .stars{opacity:1;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 2s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}
.sky-body{position:fixed;top:14px;right:14px;width:28px;height:28px;border-radius:50%;z-index:1;transition:all 2s;}
body.day   .sky-body{background:radial-gradient(circle at 40% 35%,#ffe066,#f59e0b);box-shadow:0 0 18px #fde047;}
body.night .sky-body{background:radial-gradient(circle at 60% 35%,#e8e8d0,#b0b090);box-shadow:0 0 12px #c8c8a0;}
.title{font-size:9px;letter-spacing:4px;text-transform:uppercase;margin-bottom:10px;opacity:.7;position:relative;z-index:2;transition:color 2s;}
body.day   .title{color:#1a6e1a;}
body.night .title{color:#4ade80;}
.scene{position:relative;width:190px;height:230px;display:flex;align-items:flex-end;justify-content:center;z-index:2;}
#plant-wrap{position:relative;width:100%;height:100%;display:flex;align-items:flex-end;justify-content:center;}
@keyframes breathe{0%,100%{transform:scaleY(1) translateY(0)}50%{transform:scaleY(1.02) translateY(-3px)}}
@keyframes sleeping{0%,100%{transform:scaleY(1) translateY(0)}50%{transform:scaleY(1.008) translateY(-1px)}}
.anim-breathe{animation:breathe 5s ease-in-out infinite;transform-origin:bottom center;}
.anim-sleep  {animation:sleeping 3s ease-in-out infinite;transform-origin:bottom center;}
@keyframes faceWater{0%{transform:rotate(0deg) scale(1)}20%{transform:rotate(-8deg) scale(1.05)}50%{transform:rotate(7deg) scale(1.05)}75%{transform:rotate(-4deg) scale(1.02)}100%{transform:rotate(0deg) scale(1)}}
.face-watered{animation:faceWater 0.9s ease-in-out 1;transform-origin:center center;}
.zzz{position:absolute;font-weight:bold;color:#a0c8ff;pointer-events:none;z-index:20;animation:floatZzz 2s ease-out infinite;}
@keyframes floatZzz{0%{opacity:0;transform:translate(0,0) scale(.5)}30%{opacity:1}100%{opacity:0;transform:translate(14px,-35px) scale(1.3)}}
.drop{position:absolute;width:5px;height:8px;background:#60c8ff;border-radius:50% 50% 50% 50%/40% 40% 60% 60%;opacity:0;animation:falling .9s ease-in forwards;}
@keyframes falling{0%{opacity:.9;transform:translateY(0)}100%{opacity:0;transform:translateY(220px)}}
.splash{position:absolute;font-size:16px;pointer-events:none;animation:splashAnim .7s ease-out forwards;}
@keyframes splashAnim{0%{opacity:1;transform:scale(.4)}100%{opacity:0;transform:scale(2) translateY(-12px)}}
.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.particle{position:absolute;border-radius:50%;opacity:0;animation:floatUp 3s ease-in infinite;}
@keyframes floatUp{0%{opacity:0;transform:translateY(0) scale(1)}15%{opacity:.8}100%{opacity:0;transform:translateY(-90px) scale(.1)}}
.water-btn{margin-top:8px;background:none;border:1px solid #1e4d3a;border-radius:10px;padding:6px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;color:#4ade80;font-size:10px;font-family:'Courier New',monospace;letter-spacing:1px;transition:all .2s;user-select:none;z-index:2;}
body.day .water-btn{border-color:#2d8a2d;color:#1a6e1a;}
.water-btn:hover{background:rgba(74,222,128,.1);border-color:#4ade80;}
.water-btn:active{transform:scale(.96);}
.water-btn svg{transition:transform .2s;}
.water-btn:hover svg{transform:rotate(-20deg);}
.stats-box{width:100%;border-radius:10px;padding:12px;margin-top:8px;z-index:2;transition:background 2s,border-color 2s;}
body.day   .stats-box{background:rgba(255,255,255,.5);border:1px solid #a5d6a7;}
body.night .stats-box{background:#0f1a0f;border:1px solid #1a3a1a;}
.stage-name{text-align:center;font-size:12px;font-weight:bold;color:var(--sc,#4ade80);margin-bottom:10px;letter-spacing:2px;}
.stages-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;padding:0 2px;}
.stage-dot{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:14px;opacity:.3;transition:all .4s;}
.stage-dot.done{opacity:.6;}
.stage-dot.active{opacity:1;transform:scale(1.3);filter:drop-shadow(0 0 6px var(--sc,#4ade80));}
.stage-dot span{font-size:7px;color:#8b949e;}
.stat-row{display:flex;justify-content:space-between;font-size:10px;margin-bottom:5px;transition:color 2s;}
body.day   .stat-row{color:#2d6a2d;}
body.night .stat-row{color:#4a6a4a;}
.stat-val{font-weight:bold;}
body.day   .stat-val{color:#1a3a1a;}
body.night .stat-val{color:#a8d8a8;}
.progress-wrap{margin-top:8px;}
.progress-label{display:flex;justify-content:space-between;font-size:9px;color:#4a6a4a;margin-bottom:4px;}
.progress-track{width:100%;height:5px;border-radius:3px;overflow:hidden;transition:background 2s;}
body.day   .progress-track{background:#c8e6c9;border:1px solid #a5d6a7;}
body.night .progress-track{background:#0a150a;border:1px solid #1a3a1a;}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--bs,#14532d),var(--be,#4ade80));transition:width .7s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
.progress-fill::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 2.5s infinite;}
@keyframes shimmer{0%{left:-100%}100%{left:100%}}
.message{text-align:center;font-size:10px;font-style:italic;margin-top:10px;min-height:26px;line-height:1.4;transition:color 2s;}
body.day   .message{color:#2d6a2d;}
body.night .message{color:#4a6a4a;}
.streak-badge{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:8px;padding:4px 12px;border-radius:20px;font-size:10px;transition:all .3s;z-index:2;}
body.day   .streak-badge{background:rgba(255,255,255,.4);border:1px solid #a5d6a7;color:#2d6a2d;}
body.night .streak-badge{background:#0f1a0f;border:1px solid #1a3a1a;color:#4a6a4a;}
.streak-badge.active{border-color:#f97316!important;color:#f97316!important;background:#1a0e00!important;}
.evolve-toast{position:fixed;top:8px;left:50%;transform:translateX(-50%) translateY(-60px);background:#0f1a0f;border:1px solid #4ade80;border-radius:8px;padding:7px 14px;font-size:11px;color:#4ade80;transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:100;white-space:nowrap;}
.evolve-toast.show{transform:translateX(-50%) translateY(0);}
.float-point{position:fixed;font-size:11px;font-weight:bold;pointer-events:none;animation:floatScore 1.2s ease-out forwards;z-index:200;}
@keyframes floatScore{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-45px)}}
@keyframes spinBox{from{transform:rotateX(20deg) rotateY(0deg)}to{transform:rotateX(20deg) rotateY(360deg)}}
@keyframes floatBox{0%,100%{margin-top:0}50%{margin-top:-8px}}
.mbox-face{position:absolute;width:56px;height:56px;border:2px solid #3d1a00;box-sizing:border-box;}
#cube-cactus .mbox-face,#cube-daisy .mbox-face,#cube-alien .mbox-face{width:40px;height:40px;}
#cube-cactus .mbox-face.front,#cube-daisy .mbox-face.front,#cube-alien .mbox-face.front{transform:translateZ(20px);}
#cube-cactus .mbox-face.back,#cube-daisy .mbox-face.back,#cube-alien .mbox-face.back{transform:rotateY(180deg) translateZ(20px);}
#cube-cactus .mbox-face.left,#cube-daisy .mbox-face.left,#cube-alien .mbox-face.left{transform:rotateY(-90deg) translateZ(20px);}
#cube-cactus .mbox-face.right,#cube-daisy .mbox-face.right,#cube-alien .mbox-face.right{transform:rotateY(90deg) translateZ(20px);}
#cube-cactus .mbox-face.top,#cube-daisy .mbox-face.top,#cube-alien .mbox-face.top{transform:rotateX(90deg) translateZ(20px);}
#cube-cactus .mbox-face.bottom,#cube-daisy .mbox-face.bottom,#cube-alien .mbox-face.bottom{transform:rotateX(-90deg) translateZ(20px);}
#cube-cactus .mbox-face.front::after,#cube-cactus .mbox-face.back::after,#cube-cactus .mbox-face.left::after,#cube-cactus .mbox-face.right::after,
#cube-daisy .mbox-face.front::after,#cube-daisy .mbox-face.back::after,#cube-daisy .mbox-face.left::after,#cube-daisy .mbox-face.right::after,
#cube-alien .mbox-face.front::after,#cube-alien .mbox-face.back::after,#cube-alien .mbox-face.left::after,#cube-alien .mbox-face.right::after{font-size:18px;}
.mbox-face.front {background:#a05010;transform:translateZ(28px);}
.mbox-face.back  {background:#7a3808;transform:rotateY(180deg) translateZ(28px);}
.mbox-face.left  {background:#7a3808;transform:rotateY(-90deg) translateZ(28px);}
.mbox-face.right {background:#8a4010;transform:rotateY(90deg) translateZ(28px);}
.mbox-face.top   {background:#c8780a;transform:rotateX(90deg) translateZ(28px);}
.mbox-face.bottom{background:#3d1a00;transform:rotateX(-90deg) translateZ(28px);}
.mbox-face.front::after,.mbox-face.back::after,.mbox-face.left::after,.mbox-face.right::after{content:'?';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Arial Black',Arial,sans-serif;font-weight:900;font-size:26px;color:#fff;text-shadow:0 0 4px #3d1a00,-1px -1px 0 #3d1a00,1px -1px 0 #3d1a00,-1px 1px 0 #3d1a00,1px 1px 0 #3d1a00;}
.garden-plant{display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;}
.garden-plant-wrap{width:75px;height:100px;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;animation:breathe 5s ease-in-out infinite;transform-origin:bottom center;}
.garden-plant-wrap svg{width:75px;height:100px;flex-shrink:0;}
.garden-plant-label{font-size:7px;color:#e8f0e0;letter-spacing:1px;}
.garden-zzz{position:absolute;font-size:9px;font-weight:bold;color:#a0c8ff;pointer-events:none;animation:floatZzz 2s ease-out forwards;}
.garden-need{position:absolute;font-size:16px;top:-22px;left:50%;transform:translateX(-50%);z-index:100;cursor:pointer;}
@keyframes gardenShake{0%,100%{transform:rotate(0)}20%{transform:rotate(-8deg) scale(1.08)}40%{transform:rotate(8deg) scale(1.08)}60%{transform:rotate(-5deg)}80%{transform:rotate(5deg)}}
#garden-row::before{display:none;}
</style>
</head>

<div class="stars" id="stars"></div>
<div class="sky-body"></div>
<div class="title">🌿 code garden</div>
<div class="evolve-toast" id="toast"></div>

  <div class="particles" id="particles"></div>

</div>

  regar
</button>

    <div class="stage-dot" data-s="1"><span>🌿</span><span>brote</span></div>
    <div class="stage-dot" data-s="2"><span>🪴</span><span>joven</span></div>

    <div class="progress-track"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  </div>
  <div class="message" id="message">Escribe código para despertar tu semilla...</div>
</div>
<div class="streak-badge" id="streak-badge">🔥 <span id="streak-text">Sin racha aún</span></div>

<button id="btn-cactus" style="position:fixed;top:calc(50% + 3cm);left:calc(50% - 100px);width:65px;height:65px;background:transparent;border:none;cursor:pointer;z-index:99999;padding:0;display:none;" onclick="openBox('btn-cactus','cube-cactus','🌱','cactus')">
  <div id="cube-cactus" style="width:40px;height:40px;position:absolute;top:6px;left:10px;transform-style:preserve-3d;animation:spinBox 5s linear infinite,floatBox 2s ease-in-out infinite;animation-delay:-2s;pointer-events:none;">
    <div class="mbox-face front"></div><div class="mbox-face back"></div><div class="mbox-face left"></div><div class="mbox-face right"></div><div class="mbox-face top"></div><div class="mbox-face bottom"></div>
  </div>
</button>

<button id="btn-daisy" style="position:fixed;top:calc(50% + 3cm);left:calc(50% - 30px);width:65px;height:65px;background:transparent;border:none;cursor:pointer;z-index:99999;padding:0;display:none;" onclick="openBox('btn-daisy','cube-daisy','🌼','daisy')">
  <div id="cube-daisy" style="width:40px;height:40px;position:absolute;top:6px;left:10px;transform-style:preserve-3d;animation:spinBox 5s linear infinite,floatBox 2s ease-in-out infinite;animation-delay:-3s;pointer-events:none;">
    <div class="mbox-face front"></div><div class="mbox-face back"></div><div class="mbox-face left"></div><div class="mbox-face right"></div><div class="mbox-face top"></div><div class="mbox-face bottom"></div>
  </div>
</button>

<button id="btn-alien" style="position:fixed;top:calc(50% + 3cm);left:calc(50% + 40px);width:65px;height:65px;background:transparent;border:none;cursor:pointer;z-index:99999;padding:0;display:none;" onclick="openBox('btn-alien','cube-alien','👽','alien')">
  <div id="cube-alien" style="width:40px;height:40px;position:absolute;top:6px;left:10px;transform-style:preserve-3d;animation:spinBox 5s linear infinite,floatBox 2s ease-in-out infinite;animation-delay:-4s;pointer-events:none;">
    <div class="mbox-face front"></div><div class="mbox-face back"></div><div class="mbox-face left"></div><div class="mbox-face right"></div><div class="mbox-face top"></div><div class="mbox-face bottom"></div>
  </div>
</button>

      counter.style.transition = 'transform .15s';
      counter.style.transform = 'scale(1.6)';
      setTimeout(function(){ counter.style.transform = 'scale(1)'; }, 150);
    }
  }, 620);
}

function openBox(btnId, cubeId, emoji, plantType) {
  if (gardenState.usedBoxIds && gardenState.usedBoxIds.indexOf(btnId) !== -1) return;
  if (currentStage === 4 && !gardenState._autoCollected) {
    gardenState._autoCollected = true;
    saveGarden();
    var wrap = document.getElementById('plant-wrap');
    var gardenRow = document.getElementById('garden-slots');
    if (gardenRow.querySelectorAll('.garden-plant').length < 3) {
      var gItem = document.createElement('div'); gItem.className = 'garden-plant';
      var gPw = document.createElement('div'); gPw.className = 'garden-plant-wrap';
      gPw.innerHTML = wrap.innerHTML.replace('width="160" height="215"','width="75" height="100"');
      var gLbl = document.createElement('div'); gLbl.className = 'garden-plant-label';
      gItem.appendChild(gPw); gItem.appendChild(gLbl); gardenRow.appendChild(gItem);
      startGardenLife(gItem);
    }
    if (!gardenState.totalCompleted) gardenState.totalCompleted = 0;
    gardenState.totalCompleted++;
    saveGarden();
    var bookCount = document.getElementById('book-count');
    if (bookCount) bookCount.textContent = gardenState.totalCompleted;
  }
  var cube = document.getElementById(cubeId);
  var btn  = document.getElementById(btnId);
  btn.style.pointerEvents = 'none';
  cube.style.animation = 'none';
  cube.style.transition = 'transform .15s';
  cube.style.transform = 'rotateX(20deg) rotateY(45deg) scale(1.2)';
  setTimeout(function() {
    cube.style.transform = 'rotateX(20deg) rotateY(45deg) scale(1.1)';
    var seed = document.createElement('div');
    seed.textContent = emoji;
    seed.style.cssText = 'position:fixed;font-size:22px;z-index:99999;pointer-events:none;transition:transform .6s cubic-bezier(.2,1.4,.4,1),opacity .6s;';
    var r = cube.getBoundingClientRect();
    seed.style.left = (r.left + r.width/2 - 11) + 'px';
    seed.style.top  = (r.top  + r.height/2 - 11) + 'px';
    document.body.appendChild(seed);
    setTimeout(function() { seed.style.transform = 'translateY(-80px) scale(1.5)'; seed.style.opacity = '0'; }, 50);
    setTimeout(function() { seed.remove(); }, 700);
    setTimeout(function() { cube.style.transform = 'scale(0)'; cube.style.opacity = '0'; }, 300);
    setTimeout(function() {
      var wrap = document.getElementById('plant-wrap');
      if (plantType === 'cactus') {
        wrap.innerHTML = buildKawaiiCactus(0, getSeedFace('idle'));

      } else {

        gardenState._boxOpened = false;
        gardenState._boxPlant  = 'alien';
      }
      wrap.classList.remove('anim-breathe','anim-sleep');
      wrap.classList.add('anim-breathe');
      gardenState._autoCollected = false;
      currentStage = 0;
      if (!gardenState.usedBoxIds) gardenState.usedBoxIds = [];

        cube.style.transition = 'none';

        cube.style.opacity    = '1';
        cube.style.animation  = 'none';
        cube.style.filter     = 'grayscale(1) brightness(.6)';
        btn.style.pointerEvents = 'none';

function startGardenLife(item) {
  var sleeping = false;
  var zzzTimer = null;
  var needTimer = null;
  var zzzInt = null;
  var currentNeed = null;
  var needs = ['💧','🌱','🤗','💧','💧'];

  function setFaceExpression(expr) {
    var pw = item.querySelector('.garden-plant-wrap');
    if (!pw) return;
    var svg = pw.querySelector('svg');
    if (!svg) return;
    svg.querySelectorAll('.g-face-overlay').forEach(function(e){ e.remove(); });
    if (expr === 'cry') {
      var vb = (svg.getAttribute('viewBox')||'0 0 75 100').split(' ');
      var vw = parseFloat(vb[2])||75, vh = parseFloat(vb[3])||100;
      var g = document.createElementNS('http://www.w3.org/2000/svg','g');
      g.setAttribute('class','g-face-overlay');
      var cx = vw*0.5, cy = vh*0.22, r = vw*0.07;
      [[cx-r*1.1, cy+r*1.0],[cx+r*1.1, cy+r*1.0]].forEach(function(pos){
        var d = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
        d.setAttribute('cx',pos[0]); d.setAttribute('cy',pos[1]);
        d.setAttribute('rx',r*0.3); d.setAttribute('ry',r*0.65);
        d.setAttribute('fill','#60c8ff'); d.setAttribute('opacity','.9');
        g.appendChild(d);
      });
      svg.appendChild(g);
    } else if (expr === 'happy') {
      pw.style.animation = 'gardenShake .5s ease-in-out';
      setTimeout(function(){ pw.style.animation = 'breathe 5s ease-in-out infinite'; }, 520);
      animateMouthHappy(svg);
    }
  }

  function animateMouthHappy(svg) {
    var mouths = [];
    svg.querySelectorAll('path').forEach(function(p) {
      var d = p.getAttribute('d') || '';
      var fill = p.getAttribute('fill') || '';
      var stroke = p.getAttribute('stroke') || '';
      if (fill === 'none' && stroke && d.indexOf('Q') !== -1) mouths.push(p);
    });
    if (!mouths.length) return;
    var mouth = mouths[mouths.length - 1];
    var orig = mouth.getAttribute('d');
    var vb = (svg.getAttribute('viewBox')||'0 0 75 100').split(' ');
    var vw = parseFloat(vb[2])||75, vh = parseFloat(vb[3])||100;
    var cx = vw*0.5, cy = vh*0.22, r = vw*0.12;
    var bigSmile = 'M'+(cx-r*1.2)+' '+(cy+r*1.0)+' Q'+cx+' '+(cy+r*2.8)+' '+(cx+r*1.2)+' '+(cy+r*1.0);
    mouth.setAttribute('d', bigSmile);
    mouth.setAttribute('stroke-width','2.5');
    setTimeout(function(){ mouth.setAttribute('d', orig); mouth.setAttribute('stroke-width',''); }, 1800);
  }

  function closeSvgEyes(pw) {
    var svg = pw.querySelector('svg');
    if (!svg) return;
    svg.querySelectorAll('circle').forEach(function(c) {
      var cx = parseFloat(c.getAttribute('cx'));
      var cy = parseFloat(c.getAttribute('cy'));
      var r  = parseFloat(c.getAttribute('r'));
      if (r >= 1.8 && r <= 3.5 && cy > 30 && cy < 55) {
        var arc = document.createElementNS('http://www.w3.org/2000/svg','path');
        arc.setAttribute('d','M'+(cx-r)+' '+cy+' Q'+cx+' '+(cy+r*1.4)+' '+(cx+r)+' '+cy);
        arc.setAttribute('stroke','#3a3a3a'); arc.setAttribute('stroke-width','2');
        arc.setAttribute('fill','none'); arc.setAttribute('stroke-linecap','round');
        arc.setAttribute('class','sleep-eye');
        c.parentNode.insertBefore(arc, c.nextSibling);
        c.style.display = 'none';
      }
    });
  }

  function openSvgEyes(pw) {
    var svg = pw.querySelector('svg');
    if (!svg) return;
    svg.querySelectorAll('.sleep-eye').forEach(function(e){ e.remove(); });
    svg.querySelectorAll('circle').forEach(function(c){ c.style.display = ''; });
  }

  function spawnZzz() {
    var z = document.createElement('div');
    z.className = 'garden-zzz';
    z.textContent = ['z','z','Z'][Math.floor(Math.random()*3)];
    z.style.cssText = 'left:'+(38+Math.random()*24)+'%;bottom:'+(55+Math.random()*20)+'%;';
    item.appendChild(z);
    setTimeout(function(){ z.remove(); }, 2000);
  }

  function startSleep() {
    if (currentNeed) return;
    sleeping = true;
    var pw = item.querySelector('.garden-plant-wrap');
    if (pw) {
      pw.style.animation = 'sleeping 3s ease-in-out infinite';
      pw.style.filter = 'brightness(.85)';
      closeSvgEyes(pw);
    }
    setFaceExpression('sleep');
    zzzInt = setInterval(spawnZzz, 900);  }

  function wakeUp() {
    sleeping = false;
    clearInterval(zzzInt);
    var pw = item.querySelector('.garden-plant-wrap');
    if (pw) {
      pw.style.animation = 'breathe 5s ease-in-out infinite';
      pw.style.filter = '';
      openSvgEyes(pw);
    }
    item.querySelectorAll('.garden-zzz').forEach(function(z){ z.remove(); });
  }

  function showNeed() {
    if (currentNeed) return;
    var emoji = needs[Math.floor(Math.random()*needs.length)];
    var n = document.createElement('div');
    n.className = 'garden-need';
    n.textContent = emoji;
    n.style.cssText = 'position:absolute;font-size:16px;top:-22px;left:50%;transform:translateX(-50%);cursor:pointer;animation:none;opacity:1;z-index:100;';
    item.appendChild(n);
    currentNeed = n;
    item._needsWater = (emoji === '💧');
    item._needsDirt  = (emoji === '🌱');
    if (sleeping) wakeUp();
    if (emoji !== '💧' && emoji !== '🪱') {
      n.addEventListener('click', function() {
        n.style.transition = 'opacity .3s,transform .3s';
        n.style.opacity = '0';
        n.style.transform = 'translateX(-50%) translateY(-12px) scale(1.4)';
        setTimeout(function(){
          n.remove(); currentNeed = null; item._needsWater = false;
          setFaceExpression('happy');
          scheduleNeed();
        }, 350);
      });
      setTimeout(function() {
        if (currentNeed === n) { n.remove(); currentNeed = null; item._needsWater = false; scheduleNeed(); }
      }, 30000);
    } else {
      setTimeout(function() {
        if (currentNeed === n) { setFaceExpression('cry'); }
      }, 120000);
      setTimeout(function() {
        if (currentNeed === n) { n.remove(); currentNeed = null; item._needsWater = false; item._needsDirt = false; scheduleNeed(); }
      }, 3600000);
    }
  }

  item.satisfyWater = function() {
    if (!item._needsWater || !currentNeed) return false;
    var n = currentNeed;
    n.style.transition = 'opacity .4s,transform .4s';
    n.style.opacity = '0';
    n.style.transform = 'translateX(-50%) translateY(-14px) scale(1.5)';
    setTimeout(function(){ n.remove(); currentNeed = null; item._needsWater = false; }, 400);
    var pw = item.querySelector('.garden-plant-wrap');
    if (pw) {
      var svg = pw.querySelector('svg');
      var isCactus = svg && svg.innerHTML.indexOf('b5c830') !== -1;
      if (isCactus) {
        var arms = [];
        svg.querySelectorAll('path').forEach(function(p) {
          var d = p.getAttribute('d') || '';
          if ((d.indexOf('Q46') !== -1 || d.indexOf('Q114') !== -1 || d.indexOf('Q52') !== -1 || d.indexOf('Q108') !== -1) && p.getAttribute('fill') === '#3a9a30') {
            arms.push(p);
          }
        });
        arms.forEach(function(arm, i) {
          var orig = arm.getAttribute('transform') || '';
          var cx = i === 0 ? '68' : '92';
          var cy = '108';
          arm.style.transformOrigin = cx+'px '+cy+'px';
          arm.style.transformBox = 'fill-box';
          var frames = [0, -18, 14, -10, 6, 0];
          var t = 0;
          frames.forEach(function(deg, fi) {
            setTimeout(function(){
              arm.style.transform = 'rotate('+deg+'deg)';
              arm.style.transition = 'transform .12s ease-in-out';
            }, t);
            t += 120;
          });
          setTimeout(function(){ arm.style.transform = ''; arm.style.transition = ''; }, t+50);
        });
        pw.style.filter = 'brightness(1.15) saturate(1.3)';
        setTimeout(function(){ pw.style.filter = ''; }, 1500);
        animateMouthHappy(svg);
      } else {
        pw.style.filter = 'brightness(1.15) saturate(1.3)';
        setTimeout(function(){ pw.style.filter = ''; }, 1500);
        setFaceExpression('happy');
      }
    }
    needTimer = setTimeout(showNeed, 3600000);
    addCoin(item);
    return true;
  };

  item.satisfyDirt = function() {
    if (!item._needsDirt || !currentNeed) return false;
    var n = currentNeed;
    n.style.transition = 'opacity .4s,transform .4s';
    n.style.opacity = '0';
    n.style.transform = 'translateX(-50%) translateY(-14px) scale(1.5)';
    setTimeout(function(){ n.remove(); currentNeed = null; item._needsDirt = false; }, 400);
    var pw = item.querySelector('.garden-plant-wrap');
    if (pw) { pw.style.filter = 'brightness(1.1) hue-rotate(10deg)'; setTimeout(function(){ pw.style.filter = ''; }, 1500); }
    setFaceExpression('happy');
    needTimer = setTimeout(showNeed, 3600000);
    addCoin(item);
    return true;
  };

  function scheduleSleep() {
    zzzTimer = setTimeout(function(){
      startSleep();
      scheduleSleep();
    }, 600000 + Math.random()*300000);
  }

  function scheduleNeed() {
    needTimer = setTimeout(showNeed, 60000);
  }

  setFaceExpression('happy');
  scheduleSleep();
  scheduleNeed();}

function toggleBookOpen() {
  var cover = document.getElementById('bookCover');
  var pL = document.getElementById('bookPageLeft');
  var pR = document.getElementById('bookPageRight');
  var div = document.getElementById('bookDivider');
  var edges = document.getElementById('bookEdges');
  var isOpen = cover.dataset.open === '1';
  if (!isOpen) {
    cover.style.transform = 'translateX(-9px) rotateY(-180deg)';
    cover.dataset.open = '1';
    pL.style.width = '200px'; pL.style.opacity = '1'; pL.style.padding = '12px 8px';
    pR.style.width = '200px'; pR.style.opacity = '1'; pR.style.padding = '12px 8px';
    if (div) div.style.opacity = '1';
    if (edges) edges.style.opacity = '0';
    var pg = document.getElementById('bookPagination');
    if (pg) pg.style.display = 'flex';
  } else {
    cover.style.transform = 'translateX(-9px) rotateY(0deg)';
    cover.dataset.open = '0';
    pL.style.width = '0'; pL.style.opacity = '0'; pL.style.padding = '0';
    pR.style.width = '0'; pR.style.opacity = '0'; pR.style.padding = '0';
    if (div) div.style.opacity = '0';
    if (edges) edges.style.opacity = '1';
    var pg = document.getElementById('bookPagination');
    if (pg) pg.style.display = 'none';
  }
}

function showEvolve(type, plantSvgHtml) {
  var data = EVOLVE_DATA[type] || EVOLVE_DATA.rose;
  document.getElementById('evolve-title').textContent = data.title;
  document.getElementById('evolve-subtitle').textContent = data.subtitle;
  document.getElementById('evolve-desc').textContent = data.desc;
  var plantDiv = document.getElementById('evolve-plant');
  plantDiv.innerHTML = '<div style="filter:drop-shadow(0 0 20px '+data.color+') drop-shadow(0 0 10px '+data.color+');">'+data.svg+'</div>';

}

function bookZoomIn()  { _bookZoom = Math.min(1.6, _bookZoom + 0.2); applyBookZoom(); }
function bookZoomOut() { _bookZoom = Math.max(0.6, _bookZoom - 0.2); applyBookZoom(); }
function applyBookZoom() {
  var inner = document.querySelector('#book-popup > div');
  if (inner) inner.style.transform = 'scale(' + _bookZoom + ')';
}

function renderBookPage() {
  var pL = document.getElementById('bookPlantsLeft');
  var pR = document.getElementById('bookPlantsRight');
  var pageNum = document.getElementById('bookPageNum');
  pL.innerHTML = ''; pR.innerHTML = '';
  var emojis = ['🌸','🌵','🌼','👽','🌹','🌻'];

  var PLANT_INFO = {
    rose:   { name: 'Rosa Galáctica',   desc: 'Nació con tu primer commit.\nCrece cada vez que escribes código.\nSus pétalos rosados brillan más\ncuando el proyecto avanza.', color: '#c04090' },
    cactus: { name: 'Cactus Kawaii',    desc: 'Resistente como el código legacy.\nCada espina es una línea guardada.\nSonríe aunque el build falle.\nNunca necesita refactor.', color: '#2a7a22' },
    daisy:  { name: 'Shalala',          desc: 'Florece al ritmo de tus funciones.\nSus pétalos blancos son puros\ncomo el código bien documentado.\nSiempre sonríe al compilar.', color: '#c87800' },
    alien:  { name: 'Flora Alienígena', desc: 'Llegó de otro repositorio.\nSus antenas detectan errores\nantes de que aparezcan.\nEvolucionó con cada merge.', color: '#3a8a3a' }
  };

  function detectPlantType(pw) {
    var html = pw.innerHTML;
    if (html.indexOf('b5c830') !== -1 || html.indexOf('3a9a30') !== -1) return 'cactus';
    if (html.indexOf('76D178') !== -1 || html.indexOf('99E99B') !== -1) return 'alien';
    if (html.indexOf('6a9a40') !== -1 || html.indexOf('f5b800') !== -1) return 'daisy';
    return 'rose';
  }

  function makePlantEl(plant, idx) {
    var pw = plant.querySelector('.garden-plant-wrap');
    if (!pw) return null;
    var type = detectPlantType(pw);
    var info = PLANT_INFO[type] || PLANT_INFO.rose;
    var wrap = document.createElement('div');
    wrap.style.cssText = 'width:90px;height:120px;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;filter:drop-shadow(0 3px 6px rgba(0,0,0,.2));flex-shrink:0;';
    wrap.innerHTML = pw.innerHTML.replace(/width="75" height="100"/g,'width="90" height="120"');
    var name = document.createElement('div');
    name.style.cssText = 'font-size:8px;font-weight:bold;color:'+info.color+';font-family:\'Courier New\',monospace;text-align:center;margin-top:4px;';
    name.textContent = info.name;
    var desc = document.createElement('div');
    desc.style.cssText = 'font-size:7px;color:#8a6020;font-family:\'Courier New\',monospace;text-align:center;margin-top:3px;line-height:1.5;white-space:pre-line;';
    desc.textContent = info.desc;
    var btn = document.createElement('button');
    btn.textContent = 'Evolucionar';
    btn.style.cssText = 'margin-top:6px;padding:3px 10px;background:'+info.color+';color:#fff;border:none;border-radius:8px;font-size:7px;font-family:\'Courier New\',monospace;cursor:pointer;opacity:0.85;';
    btn.onclick = function(){ showEvolve(type, wrap.innerHTML); };
    var col = document.createElement('div');
    col.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:6px;';
    col.appendChild(name); col.appendChild(wrap); col.appendChild(desc); col.appendChild(btn);    return col;
  }

  var leftIdx  = _bookPage * 2;
  var rightIdx = _bookPage * 2 + 1;
  if (_bookPlants[leftIdx])  { var el = makePlantEl(_bookPlants[leftIdx],  leftIdx);  if (el) pL.appendChild(el); }
  if (_bookPlants[rightIdx]) { var el = makePlantEl(_bookPlants[rightIdx], rightIdx); if (el) pR.appendChild(el); }
  if (!_bookPlants.length) {
    pL.innerHTML = '<div style="font-size:9px;color:#8a6020;font-family:\'Courier New\',monospace;text-align:center;padding:20px 8px;">Aún no hay plantas</div>';
  }
  var totalPages = Math.ceil(_bookPlants.length / 2) || 1;
  if (pageNum) pageNum.textContent = (_bookPage + 1) + '/' + totalPages;
  document.getElementById('bookPrev').style.opacity = _bookPage > 0 ? '1' : '0.3';
  document.getElementById('bookNext').style.opacity = (_bookPage + 1) < totalPages ? '1' : '0.3';
}

function bookPrevPage() { if (_bookPage > 0) { _bookPage--; renderBookPage(); } }
function bookNextPage() { if ((_bookPage + 1) * 2 < _bookPlants.length) { _bookPage++; renderBookPage(); } }

function openBookPopup() {
  var popup = document.getElementById('book-popup');
  if (!popup) return;
  var slots = document.getElementById('garden-slots');
  _bookPlants = slots ? Array.from(slots.querySelectorAll('.garden-plant')) : [];
  _bookPage = 0;
  var total = document.getElementById('book-total');
  if (total) total.textContent = gardenState.totalCompleted || 0;
  var cover = document.getElementById('bookCover');
  if (cover) { cover.style.transform = 'translateX(-9px) rotateY(0deg)'; cover.dataset.open = '0'; }
  var pLEl = document.getElementById('bookPageLeft');

  if (pLEl) { pLEl.style.width='0'; pLEl.style.opacity='0'; pLEl.style.padding='0'; }
  if (pREl) { pREl.style.width='0'; pREl.style.opacity='0'; pREl.style.padding='0'; }
  var div = document.getElementById('bookDivider');
  if (div) div.style.opacity = '0';
  renderBookPage();

  ['btn-cactus','btn-daisy','btn-alien'].forEach(function(id){

function closeBookPopup() {
  var popup = document.getElementById('book-popup');
  if (!popup) return;
  popup.style.display = 'none';
  ['btn-cactus','btn-daisy','btn-alien'].forEach(function(id){
    var el = document.getElementById(id); if(el) el.style.visibility = '';

}

function updateDayNight() {
  const h = new Date().getHours(), day = h>=6&&h<20;
  if (day===isDay) return; isDay=day;
  document.body.classList.toggle('day',day); document.body.classList.toggle('night',!day); buildStars();
}
function buildStars() {
  const c=document.getElementById('stars'); c.innerHTML=''; if(isDay) return;
  for(let i=0;i<45;i++){const s=document.createElement('div');s.className='star';const sz=.5+Math.random()*2;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*65}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2}s;`;c.appendChild(s);}
}

function renderPlant(stage, mood) {
  const wrap = document.getElementById('plant-wrap');
  if (gardenState._boxPlant === 'daisy') {
    wrap.innerHTML = buildDaisySVG(stage, getFlowerFace(mood));
    wrap.style.filter = `drop-shadow(0 0 16px #f5b800)`;
  } else if (gardenState._boxPlant === 'alien') {
    wrap.innerHTML = buildAlienSVG(stage, mood);
    wrap.style.filter = `drop-shadow(0 0 16px #76D178)`;
    startAlienBlink();
  } else if (gardenState._boxOpened) {
    wrap.innerHTML = buildKawaiiCactus(stage, getFlowerFace(mood));
    wrap.style.filter = `drop-shadow(0 0 16px #4a9a2a)`;
    startCactusBlink();
  } else {
    const face = stage === 0 ? getSeedFace(mood) : getFlowerFace(mood);
    wrap.innerHTML = buildRoseSVG(stage, face);
    wrap.style.filter = `drop-shadow(0 0 16px ${GLOWS[Math.min(stage,4)]})`;
  }
  wrap.classList.remove('anim-breathe','anim-sleep');
  wrap.classList.add(mood==='sleep'?'anim-sleep':'anim-breathe');
  spawnParticles(stage);
}

function setMood(mood, duration) {
  currentMood = mood;
  const wrap = document.getElementById('plant-wrap');
  if (gardenState._boxPlant === 'daisy') {
    wrap.innerHTML = buildDaisySVG(currentStage, getFlowerFace(mood));
    wrap.style.filter = `drop-shadow(0 0 16px #f5b800)`;
  } else if (gardenState._boxPlant === 'alien') {
    wrap.innerHTML = buildAlienSVG(currentStage, mood);
    wrap.style.filter = `drop-shadow(0 0 16px #76D178)`;
    startAlienBlink();
  } else if (gardenState._boxOpened) {
    wrap.innerHTML = buildKawaiiCactus(currentStage, getFlowerFace(mood));
    wrap.style.filter = `drop-shadow(0 0 16px #4a9a2a)`;
    startCactusBlink();
  } else {
    const face = currentStage === 0 ? getSeedFace(mood) : getFlowerFace(mood);
    wrap.innerHTML = buildRoseSVG(currentStage < 0 ? 0 : currentStage, face);
    wrap.style.filter = `drop-shadow(0 0 16px ${GLOWS[Math.max(0,Math.min(currentStage,4))]})`;
  }
  wrap.classList.remove('anim-breathe','anim-sleep'); void wrap.offsetWidth;
  if (mood==='sleep') { wrap.classList.add('anim-sleep'); startZzz(); }
  else {
    stopZzz(); wrap.classList.add('anim-breathe');
    if (mood==='watered') setTimeout(()=>{
      const f=document.getElementById('plant-face');
      if(!f) return;
      if(gardenState._boxPlant === 'daisy') {
        f.style.transition='transform .15s';
        const seq=[
          'translate(0,47px) rotate(-8deg) scale(1.05)',
          'translate(0,47px) rotate(7deg) scale(1.05)',
          'translate(0,47px) rotate(-4deg) scale(1.02)',
          'translate(0,47px) rotate(0deg) scale(1)'
        ];
        let t=0;
        seq.forEach(function(v){ setTimeout(function(){ f.style.transform=v; },t); t+=200; });
      } else if(!gardenState._boxOpened) {
        f.classList.add('face-watered');
        setTimeout(()=>f.classList.remove('face-watered'),950);
      }
    },50);
  }
  if (duration) { clearTimeout(sleepTimer); sleepTimer=setTimeout(()=>{ if(currentMood===mood) setMood('idle'); },duration); }
}

function startZzz() {
  stopZzz(); const scene=document.querySelector('.scene');
  zzzInterval=setInterval(()=>{ if(currentMood!=='sleep') return stopZzz();
    const z=document.createElement('div'); z.className='zzz'; z.textContent=['z','z','Z'][Math.floor(Math.random()*3)];
    z.style.cssText=`left:${54+Math.random()*18}%;bottom:${currentStage===0?'30%':'55%'};font-size:${8+Math.random()*7}px;`;
    scene.appendChild(z); setTimeout(()=>z.remove(),2000);
  },700);
}
function stopZzz() { clearInterval(zzzInterval); document.querySelectorAll('.zzz').forEach(z=>z.remove()); }

function onActivity() {
  if (currentStage<0 && !gardenState._boxOpened && !gardenState._boxPlant) return;
  if (currentStage<0) currentStage=0;
  setMood('happy',3000); clearTimeout(idleTimer);
  idleTimer=setTimeout(()=>setMood('sleep'),12000);
}
function startSleepCycle() { clearTimeout(idleTimer); idleTimer=setTimeout(()=>setMood('sleep'),12000); }

function waterPlant() {
  const scene = document.querySelector('.scene');
  for (let i=0; i<18; i++) {
    setTimeout(()=>{
      const d=document.createElement('div'); d.className='drop';
      d.style.cssText=`left:${28+Math.random()*44}%;top:0%;animation-delay:0s;width:${4+Math.random()*3}px;height:${8+Math.random()*5}px;`;
      scene.appendChild(d); setTimeout(()=>d.remove(),1100);
    }, i*50);
  }
  setTimeout(()=>{
    for (let j=0; j<6; j++) {
      const sp=document.createElement('div'); sp.className='splash';
      sp.style.cssText=`left:${42+j*4}%;bottom:36%;font-size:11px;color:#60c8ff;`;
      sp.textContent='·'; scene.appendChild(sp); setTimeout(()=>sp.remove(),700);
    }
  },350);
  setMood('watered',4000);
  vscode.postMessage({type:'water'});
}

function spawnParticles(stage) {
  const c=document.getElementById('particles'); c.innerHTML='';
  const count=[0,2,3,5,9][stage];
  const color = gardenState._boxPlant === 'alien' ? '#76D178' : STAGE_COLORS[stage];
  for(let i=0;i<count;i++){const p=document.createElement('div');p.className='particle';const sz=2+Math.random()*3;p.style.cssText=`width:${sz}px;height:${sz}px;background:${color};left:${25+Math.random()*50}%;bottom:${20+Math.random()*55}%;animation-delay:${Math.random()*4}s;animation-duration:${2.5+Math.random()*2}s;`;c.appendChild(p);}
}
function showToast(msg) {

  setTimeout(()=>t.classList.remove('show'),3000);
}
function spawnFloat(pts,color) {
  const el=document.createElement('div'); el.className='float-point'; el.textContent='+'+pts;
  el.style.cssText=`color:${color};left:${38+Math.random()*24}%;top:30%;`; document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);

function updatePlant(data) {
  const stage = data.stage || 0;
  const lines = data.linesWritten || 0;
  const days  = data.consecutiveDays || 0;
  const mins  = Math.floor((data.totalTime||0)/60);

  if (stage < 4) gardenState._collected = false;

  if (stage !== currentStage) {
    const firstLoad = currentStage===-1;
    currentStage = stage;
    renderPlant(stage, currentMood);
    if (stage===4) {
      setMood('love',5000);
    } else if (firstLoad) setMood('sleep');
    if (stage < 4) gardenState._autoCollected = false;
    if (firstLoad) startSleepCycle();
  }

  document.documentElement.style.setProperty('--sc', STAGE_COLORS[stage]);
  document.documentElement.style.setProperty('--bs', BAR_STARTS[stage]);
  document.documentElement.style.setProperty('--be', BAR_ENDS[stage]);
  var boxDisplay = stage === 4 ? 'block' : 'none';
  ['btn-cactus','btn-daisy','btn-alien'].forEach(function(id){ var el=document.getElementById(id); if(el) el.style.display=boxDisplay; });
  document.getElementById('stage-name').textContent = STAGE_NAMES[stage];
  document.getElementById('stage-name').style.color = STAGE_COLORS[stage];
  document.getElementById('points').textContent = lines;
  document.getElementById('time').textContent = mins+' min';
  document.getElementById('message').textContent = MESSAGES[stage];
  document.querySelectorAll('.stage-dot').forEach(dot=>{
    const s=parseInt(dot.dataset.s);
    dot.classList.toggle('done',s<stage); dot.classList.toggle('active',s===stage);
  });
  const prev = data.prevThreshold!=null ? data.prevThreshold : (stage>0?THRESHOLDS[stage-1]:0);
  const next = data.threshold!=null ? data.threshold : THRESHOLDS[stage];
  const pct  = next===Infinity ? 100 : Math.min(100, Math.round(((lines-prev)/(next-prev))*100));
  document.getElementById('progress').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-label').textContent = NEXT_LABELS[stage];
  const badge = document.getElementById('streak-badge');
  if (days>=1) { badge.classList.add('active'); document.getElementById('streak-text').textContent=`${days} día${days>1?'s':''} seguido${days>1?'s':''}`; }
  else { badge.classList.remove('active'); document.getElementById('streak-text').textContent='Sin racha aún'; }
}

updateDayNight(); setInterval(updateDayNight,60000);

vscode.postMessage({type:'ready'});

(function setupTools() {
  var can = document.getElementById('watering-can');
  var bag = document.getElementById('dirt-bag');

  function resetPos(el) {
    var gardenRow = document.getElementById('garden-row');
    if (gardenRow && el.parentNode !== gardenRow) gardenRow.appendChild(el);
    el.style.position = 'absolute';
    el.style.left   = el.dataset.origLeft   || '';
    el.style.top    = el.dataset.origTop    || '';
    el.style.bottom = el.dataset.origBottom || '';
    el.style.transform = '';
    el.style.cursor = 'grab';
    el.style.zIndex = '8';
  }

  function saveOrigPos(el) {
    el.dataset.origLeft   = el.style.left;
    el.dataset.origTop    = el.style.top;
    el.dataset.origBottom = el.style.bottom;
  }

  saveOrigPos(can);
  saveOrigPos(bag);

  function makeDraggable(el, onDrop) {
    var dragging = false, ox = 0, oy = 0;
    el.addEventListener('mousedown', function(e) {
      dragging = true;
      var r = el.getBoundingClientRect();
      ox = e.clientX - r.left;
      oy = e.clientY - r.top;
      document.body.appendChild(el);
      el.style.position = 'fixed';
      el.style.left = r.left + 'px';
      el.style.top  = r.top  + 'px';
      el.style.bottom = '';
      el.style.cursor = 'grabbing';
      el.style.transform = 'scale(1.15) rotate(-15deg)';
      el.style.zIndex = '99999';
      e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
      if (!dragging) return;
      el.style.left = (e.clientX - ox) + 'px';
      el.style.top  = (e.clientY - oy) + 'px';
    });
    document.addEventListener('mouseup', function() {
      if (!dragging) return;
      dragging = false;
      var cr = el.getBoundingClientRect();
      var cx = cr.left + cr.width/2, cy = cr.top + cr.height/2;
      document.querySelectorAll('.garden-plant').forEach(function(plant) {
        var pr = plant.getBoundingClientRect();
        if (cx >= pr.left && cx <= pr.right && cy >= pr.top && cy <= pr.bottom) {
          var ok = onDrop(plant);
          if (ok) {
            var fx = document.createElement('div');
            fx.style.cssText = 'position:fixed;left:'+(pr.left+pr.width/2-10)+'px;top:'+(pr.top-10)+'px;font-size:20px;pointer-events:none;z-index:99991;animation:floatScore 1s ease-out forwards;';
            fx.textContent = el === can ? '💦' : '✨';
            document.body.appendChild(fx);
            setTimeout(function(){ fx.remove(); }, 1000);
          }
        }
      });
      resetPos(el);
    });
    el.addEventListener('touchstart', function(e) {
      dragging = true;
      var r = el.getBoundingClientRect();
      var t = e.touches[0];
      ox = t.clientX - r.left;
      oy = t.clientY - r.top;
      el.style.position = 'fixed';
      el.style.left = r.left + 'px';
      el.style.top  = r.top  + 'px';
      el.style.bottom = '';
      el.style.transform = 'scale(1.15) rotate(-15deg)';
      el.style.zIndex = '99999';
      e.preventDefault();
    }, {passive:false});
    document.addEventListener('touchmove', function(e) {
      if (!dragging) return;
      var t = e.touches[0];
      el.style.left = (t.clientX - ox) + 'px';
      el.style.top  = (t.clientY - oy) + 'px';
    }, {passive:false});
    document.addEventListener('touchend', function() {
      if (!dragging) return;
      dragging = false;
      var cr = el.getBoundingClientRect();
      var cx = cr.left + cr.width/2, cy = cr.top + cr.height/2;
      document.querySelectorAll('.garden-plant').forEach(function(plant) {
        var pr = plant.getBoundingClientRect();
        if (cx >= pr.left && cx <= pr.right && cy >= pr.top && cy <= pr.bottom) onDrop(plant);
      });
      resetPos(el);
    });
  }

  makeDraggable(can, function(plant) { return plant.satisfyWater && plant.satisfyWater(); });
  makeDraggable(bag, function(plant) { return plant.satisfyDirt  && plant.satisfyDirt();  });
})();
window.addEventListener('message', e=>{
  const msg=e.data;
  if (msg.type==='update') {
    const prev=currentStage;
    updatePlant(msg.plantData);
    if (prev>-1&&msg.plantData.stage>prev) showToast('🎉 ¡'+STAGE_NAMES[msg.plantData.stage]+'!');
  }
  if (msg.type==='wake'||msg.type==='points') {
    if (msg.type==='points'&&msg.amount>0) spawnFloat(msg.amount,STAGE_COLORS[Math.max(0,currentStage)]||'#4ade80');
    onActivity();
  }
});
