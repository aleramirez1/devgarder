<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌵 Cactus Garden</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Courier New', monospace;
  display:flex; flex-direction:column; align-items:center;
  padding:14px 12px 20px; min-height:100vh;
  background: linear-gradient(180deg,#1a0a00 0%,#2a1000 60%,#1a0800 100%);
  color:#e6c87a;
  image-rendering: pixelated;
}
.title { font-size:9px; letter-spacing:4px; text-transform:uppercase; margin-bottom:10px; opacity:.7; color:#e6a800; }
.scene { position:relative; width:190px; height:230px; display:flex; align-items:flex-end; justify-content:center; }
#plant-wrap { position:relative; width:100%; height:100%; display:flex; align-items:flex-end; justify-content:center; }
@keyframes breathe{0%,100%{transform:scaleY(1) translateY(0)}50%{transform:scaleY(1.015) translateY(-2px)}}
@keyframes sleeping{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.005) translateY(-1px)}}
.anim-breathe{animation:breathe 5s ease-in-out infinite;transform-origin:bottom center;}
.anim-sleep  {animation:sleeping 3s ease-in-out infinite;transform-origin:bottom center;}
@keyframes faceWater{0%{transform:rotate(0deg)}20%{transform:rotate(-8deg)}50%{transform:rotate(7deg)}75%{transform:rotate(-4deg)}100%{transform:rotate(0deg)}}
.face-watered{animation:faceWater 0.9s ease-in-out 1;transform-origin:center center;}
.zzz{position:absolute;font-weight:bold;color:#e6c87a;pointer-events:none;z-index:20;animation:floatZzz 2s ease-out infinite;}
@keyframes floatZzz{0%{opacity:0;transform:translate(0,0) scale(.5)}30%{opacity:1}100%{opacity:0;transform:translate(14px,-35px) scale(1.3)}}
.drop{position:absolute;width:5px;height:8px;background:#60c8ff;border-radius:50%;opacity:0;animation:falling .9s ease-in forwards;}
@keyframes falling{0%{opacity:.9;transform:translateY(0)}100%{opacity:0;transform:translateY(65px)}}
.splash{position:absolute;font-size:16px;pointer-events:none;animation:splashAnim .7s ease-out forwards;}
@keyframes splashAnim{0%{opacity:1;transform:scale(.4)}100%{opacity:0;transform:scale(2) translateY(-12px)}}
.water-btn{margin-top:8px;background:none;border:1px solid #7a4800;border-radius:10px;padding:6px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;color:#e6a800;font-size:10px;font-family:'Courier New',monospace;letter-spacing:1px;transition:all .2s;user-select:none;}
.water-btn:hover{background:rgba(230,168,0,.1);border-color:#e6a800;}
.water-btn:active{transform:scale(.96);}
.stats-box{width:100%;border-radius:10px;padding:12px;margin-top:8px;background:#1a0e00;border:1px solid #7a4800;}
.stage-name{text-align:center;font-size:12px;font-weight:bold;color:#e6a800;margin-bottom:8px;letter-spacing:2px;}
.stat-row{display:flex;justify-content:space-between;font-size:10px;margin-bottom:5px;color:#a07030;}
.stat-val{font-weight:bold;color:#e6c87a;}
.progress-track{width:100%;height:5px;border-radius:3px;overflow:hidden;background:#2a1800;border:1px solid #7a4800;margin-top:8px;}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#7a4800,#e6a800);transition:width .7s cubic-bezier(.4,0,.2,1);}
.message{text-align:center;font-size:10px;font-style:italic;margin-top:8px;color:#a07030;}
.back-btn{margin-top:10px;background:none;border:1px solid #7a4800;border-radius:8px;padding:5px 12px;cursor:pointer;color:#e6a800;font-size:9px;font-family:'Courier New',monospace;letter-spacing:1px;transition:all .2s;}
.back-btn:hover{background:rgba(230,168,0,.1);}
.float-point{position:fixed;font-size:11px;font-weight:bold;pointer-events:none;animation:floatScore 1.2s ease-out forwards;z-index:200;color:#e6a800;}
@keyframes floatScore{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-45px)}}
</style>
</head>
<body>
<div class="title">🌵 cactus garden</div>
<div class="scene">
  <div id="plant-wrap" class="anim-sleep"></div>
</div>
<button class="water-btn" onclick="waterPlant()">
  <svg width="18" height="18" viewBox="0 0 22 22" fill="none">
    <ellipse cx="9" cy="12" rx="6" ry="4.5" fill="#3a2000" stroke="#e6a800" stroke-width=".8"/>
    <path d="M15 10 Q19 8 18 14 Q17 17 15 15" stroke="#e6a800" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M3 11 Q1 9 2 7" stroke="#e6a800" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="2.2" cy="6.5" r="1.5" fill="#e6a800"/>
  </svg>
  regar
</button>
<div class="stats-box">
  <div class="stage-name" id="stage-name">🌵 Semilla</div>
  <div class="stat-row"><span>líneas de código</span><span class="stat-val" id="points">0</span></div>
  <div class="stat-row"><span>tiempo activo</span><span class="stat-val" id="time">0 min</span></div>
  <div class="progress-track"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <div class="message" id="message">Escribe código para despertar tu cactus...</div>
</div>
<button class="back-btn" onclick="window.close()">← volver</button>
<script>
const vscode = acquireVsCodeApi();

const POT = `
  <rect x="52" y="188" width="56" height="4" rx="2" fill="#000" opacity=".3"/>
  <rect x="50" y="178" width="60" height="12" rx="3" fill="#d4733a"/>
  <rect x="52" y="179" width="56" height="8" rx="2" fill="#e8844a"/>
  <rect x="54" y="185" width="52" height="8" rx="2" fill="#c1622a"/>
  <rect x="56" y="186" width="48" height="6" rx="1" fill="#d4733a"/>
  <rect x="54" y="192" width="52" height="10" rx="2" fill="#b05020"/>
  <ellipse cx="80" cy="178" rx="28" ry="5" fill="#2a1a0a"/>
  <ellipse cx="80" cy="178" rx="24" ry="3.5" fill="#3d2510"/>`;

function getCactusFace(mood) {
  if (mood === 'sleep') return `
    <rect x="70" y="116" width="6" height="3" rx="1" fill="#1a3a0a"/>
    <rect x="84" y="116" width="6" height="3" rx="1" fill="#1a3a0a"/>
    <rect x="72" y="124" width="16" height="3" rx="1" fill="#1a3a0a"/>`;
  if (mood === 'happy') return `
    <rect x="69" y="114" width="5" height="5" rx="1" fill="#1a3a0a"/>
    <rect x="86" y="114" width="5" height="5" rx="1" fill="#1a3a0a"/>
    <rect x="71" y="115" width="2" height="2" fill="#fff" opacity=".7"/>
    <rect x="88" y="115" width="2" height="2" fill="#fff" opacity=".7"/>
    <path d="M70 123 Q80 130 90 123" stroke="#1a3a0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <rect x="66" y="122" width="5" height="5" rx="2" fill="#f472b6" opacity=".4"/>
    <rect x="89" y="122" width="5" height="5" rx="2" fill="#f472b6" opacity=".4"/>`;
  if (mood === 'watered') return `
    <path d="M68 115 Q72 111 76 115" stroke="#1a3a0a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M84 115 Q88 111 92 115" stroke="#1a3a0a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M70 123 Q80 129 90 123" stroke="#1a3a0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <rect x="64" y="121" width="6" height="6" rx="3" fill="#60c8ff" opacity=".35"/>
    <rect x="90" y="121" width="6" height="6" rx="3" fill="#60c8ff" opacity=".35"/>`;
  if (mood === 'love') return `
    <path d="M67 113 Q69 110 71 112 Q73 110 75 113 Q71 117 67 113Z" fill="#e11d48"/>
    <path d="M85 113 Q87 110 89 112 Q91 110 93 113 Q89 117 85 113Z" fill="#e11d48"/>
    <path d="M69 123 Q80 132 91 123" stroke="#1a3a0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
  return `
    <rect x="70" y="114" width="5" height="5" rx="1" fill="#1a3a0a"/>
    <rect x="85" y="114" width="5" height="5" rx="1" fill="#1a3a0a"/>
    <rect x="71" y="115" width="2" height="2" fill="#fff" opacity=".6"/>
    <rect x="86" y="115" width="2" height="2" fill="#fff" opacity=".6"/>
    <path d="M72 123 Q80 127 88 123" stroke="#1a3a0a" stroke-width="2" fill="none" stroke-linecap="round"/>`;
}

function buildCactusSVG(stage, mood) {
  const face = getCactusFace(mood);
  if (stage === 0) return `<svg width="160" height="215" viewBox="0 0 160 215" xmlns="http://www.w3.org/2000/svg">
    ${POT}
    <rect x="72" y="168" width="16" height="10" rx="2" fill="#c8a850"/>
    <rect x="74" y="170" width="6" height="4" rx="1" fill="#e8c870" opacity=".7"/>
    <g id="plant-face">
      ${mood==='sleep'?`<rect x="74" y="170" width="4" height="2" rx="1" fill="#7a6020"/><rect x="82" y="170" width="4" height="2" rx="1" fill="#7a6020"/><rect x="75" y="174" width="10" height="2" rx="1" fill="#7a6020"/>`:
        mood==='happy'?`<rect x="74" y="170" width="4" height="3" rx="1" fill="#7a6020"/><rect x="82" y="170" width="4" height="3" rx="1" fill="#7a6020"/><path d="M74 174 Q80 178 86 174" stroke="#7a6020" stroke-width="1.5" fill="none"/>`:
        `<rect x="74" y="170" width="4" height="3" rx="1" fill="#7a6020"/><rect x="82" y="170" width="4" height="3" rx="1" fill="#7a6020"/><rect x="76" y="174" width="8" height="2" rx="1" fill="#7a6020"/>`}
    </g>
  </svg>`;

  if (stage === 1) return `<svg width="160" height="215" viewBox="0 0 160 215" xmlns="http://www.w3.org/2000/svg">
    ${POT}
    <rect x="72" y="148" width="16" height="30" rx="3" fill="#2d6a1a"/>
    <rect x="74" y="150" width="4" height="26" rx="1" fill="#4a9a2a" opacity=".5"/>
    <rect x="68" y="155" width="4" height="2" rx="1" fill="#e6c87a"/>
    <rect x="88" y="158" width="4" height="2" rx="1" fill="#e6c87a"/>
    <rect x="68" y="163" width="4" height="2" rx="1" fill="#e6c87a"/>
    <rect x="76" y="142" width="8" height="8" rx="2" fill="#4a9a2a"/>
    <rect x="78" y="140" width="4" height="4" rx="1" fill="#7acc4a"/>
  </svg>`;

  if (stage === 2) return `<svg width="160" height="215" viewBox="0 0 160 215" xmlns="http://www.w3.org/2000/svg">
    ${POT}
    <rect x="70" y="120" width="20" height="58" rx="4" fill="#2d6a1a"/>
    <rect x="72" y="122" width="6" height="54" rx="2" fill="#4a9a2a" opacity=".5"/>
    <rect x="46" y="138" width="24" height="14" rx="4" fill="#2d6a1a"/>
    <rect x="44" y="128" width="14" height="14" rx="4" fill="#2d6a1a"/>
    <rect x="46" y="130" width="4" height="10" rx="2" fill="#4a9a2a" opacity=".5"/>
    <rect x="90" y="142" width="24" height="14" rx="4" fill="#2d6a1a"/>
    <rect x="102" y="132" width="14" height="14" rx="4" fill="#2d6a1a"/>
    <rect x="110" y="134" width="4" height="10" rx="2" fill="#4a9a2a" opacity=".5"/>
    <rect x="64" y="126" width="6" height="2" rx="1" fill="#e6c87a"/>
    <rect x="90" y="130" width="6" height="2" rx="1" fill="#e6c87a"/>
    <rect x="64" y="140" width="6" height="2" rx="1" fill="#e6c87a"/>
    <rect x="90" y="148" width="6" height="2" rx="1" fill="#e6c87a"/>
    <rect x="40" y="132" width="4" height="2" rx="1" fill="#e6c87a"/>
    <rect x="112" y="136" width="4" height="2" rx="1" fill="#e6c87a"/>
    <rect x="74" y="112" width="12" height="10" rx="3" fill="#4a9a2a"/>
    <rect x="76" y="108" width="8" height="6" rx="2" fill="#7acc4a"/>
  </svg>`;

  if (stage === 3) return `<svg width="160" height="215" viewBox="0 0 160 215" xmlns="http://www.w3.org/2000/svg">
    ${POT}
    <rect x="68" y="95" width="24" height="83" rx="5" fill="#2d6a1a"/>
    <rect x="70" y="97" width="8" height="79" rx="3" fill="#4a9a2a" opacity=".5"/>
    <rect x="40" y="118" width="28" height="16" rx="5" fill="#2d6a1a"/>
    <rect x="38" y="104" width="16" height="18" rx="5" fill="#2d6a1a"/>
    <rect x="40" y="106" width="5" height="14" rx="2" fill="#4a9a2a" opacity=".5"/>
    <rect x="92" y="124" width="28" height="16" rx="5" fill="#2d6a1a"/>
    <rect x="106" y="110" width="16" height="18" rx="5" fill="#2d6a1a"/>
    <rect x="115" y="112" width="5" height="14" rx="2" fill="#4a9a2a" opacity=".5"/>
    <rect x="60" y="102" width="8" height="2" rx="1" fill="#e6c87a"/>
    <rect x="92" y="108" width="8" height="2" rx="1" fill="#e6c87a"/>
    <rect x="60" y="118" width="8" height="2" rx="1" fill="#e6c87a"/>
    <rect x="92" y="126" width="8" height="2" rx="1" fill="#e6c87a"/>
    <rect x="60" y="134" width="8" height="2" rx="1" fill="#e6c87a"/>
    <rect x="92" y="142" width="8" height="2" rx="1" fill="#e6c87a"/>
    <rect x="34" y="108" width="6" height="2" rx="1" fill="#e6c87a"/>
    <rect x="120" y="114" width="6" height="2" rx="1" fill="#e6c87a"/>
    <rect x="72" y="86" width="16" height="12" rx="4" fill="#4a9a2a"/>
    <rect x="74" y="80" width="12" height="8" rx="3" fill="#7acc4a"/>
    <rect x="76" y="76" width="8" height="6" rx="2" fill="#a0e060"/>
    <g id="plant-face">${face}</g>
  </svg>`;

  return `<svg width="160" height="215" viewBox="0 0 160 215" xmlns="http://www.w3.org/2000/svg">
    ${POT}
    <rect x="68" y="95" width="24" height="83" rx="5" fill="#2d6a1a"/>
    <rect x="70" y="97" width="8" height="79" rx="3" fill="#4a9a2a" opacity=".5"/>
    <rect x="40" y="118" width="28" height="16" rx="5" fill="#2d6a1a"/>
    <rect x="38" y="104" width="16" height="18" rx="5" fill="#2d6a1a"/>
    <rect x="92" y="124" width="28" height="16" rx="5" fill="#2d6a1a"/>
    <rect x="106" y="110" width="16" height="18" rx="5" fill="#2d6a1a"/>
    <rect x="34" y="96" width="8" height="8" rx="2" fill="#f472b6"/>
    <rect x="30" y="100" width="8" height="8" rx="2" fill="#f472b6"/>
    <rect x="38" y="100" width="8" height="8" rx="2" fill="#f472b6"/>
    <rect x="34" y="104" width="8" height="8" rx="2" fill="#f472b6"/>
    <rect x="36" y="100" width="6" height="6" rx="3" fill="#fde047"/>
    <rect x="118" y="102" width="8" height="8" rx="2" fill="#f472b6"/>
    <rect x="114" y="106" width="8" height="8" rx="2" fill="#f472b6"/>
    <rect x="122" y="106" width="8" height="8" rx="2" fill="#f472b6"/>
    <rect x="118" y="110" width="8" height="8" rx="2" fill="#f472b6"/>
    <rect x="120" y="106" width="6" height="6" rx="3" fill="#fde047"/>
    <rect x="72" y="76" width="8" height="8" rx="2" fill="#f472b6"/>
    <rect x="68" y="80" width="8" height="8" rx="2" fill="#f472b6"/>
    <rect x="76" y="80" width="8" height="8" rx="2" fill="#f472b6"/>
    <rect x="72" y="84" width="8" height="8" rx="2" fill="#f472b6"/>
    <rect x="74" y="80" width="6" height="6" rx="3" fill="#fde047"/>
    <rect x="60" y="102" width="8" height="2" rx="1" fill="#e6c87a"/>
    <rect x="92" y="108" width="8" height="2" rx="1" fill="#e6c87a"/>
    <rect x="60" y="118" width="8" height="2" rx="1" fill="#e6c87a"/>
    <rect x="92" y="126" width="8" height="2" rx="1" fill="#e6c87a"/>
    <g id="plant-face">${face}</g>
  </svg>`;
}

let currentStage = -1;
let currentMood  = 'sleep';
let idleTimer    = null;
let sleepTimer   = null;
let zzzInterval  = null;

const STAGE_NAMES = ['🌵 Semilla','🌵 Brote','🌵 Joven','🌵 Madura','🌵 Floreciendo'];
const THRESHOLDS  = [200, 500, 900, 1500, Infinity];
const MESSAGES    = [
  'Escribe código para despertar tu cactus...',
  '¡Está creciendo! Sigue programando 🌵',
  'Tu cactus se fortalece 💪',
  '¡Casi florece! Sigue así...',
  '🌸 ¡Ha florecido! Eres increíble'
];

function renderPlant(stage, mood) {
  const wrap = document.getElementById('plant-wrap');
  wrap.innerHTML = buildCactusSVG(stage, mood);
  wrap.style.filter = `drop-shadow(0 0 14px #e6a800)`;
  wrap.classList.remove('anim-breathe','anim-sleep');
  wrap.classList.add(mood === 'sleep' ? 'anim-sleep' : 'anim-breathe');
}

function setMood(mood, duration) {
  currentMood = mood;
  renderPlant(currentStage, mood);
  const wrap = document.getElementById('plant-wrap');
  wrap.classList.remove('anim-breathe','anim-sleep');
  if (mood === 'sleep') { wrap.classList.add('anim-sleep'); startZzz(); }
  else { stopZzz(); wrap.classList.add('anim-breathe');
    if (mood === 'watered') setTimeout(() => {
      const f = document.getElementById('plant-face');
      if (f) { f.classList.add('face-watered'); setTimeout(()=>f.classList.remove('face-watered'),950); }
    }, 50);
  }
  if (duration) { clearTimeout(sleepTimer); sleepTimer = setTimeout(()=>{ if(currentMood===mood) setMood('idle'); }, duration); }
}

function startZzz() {
  stopZzz();
  const scene = document.querySelector('.scene');
  zzzInterval = setInterval(() => {
    if (currentMood !== 'sleep') return stopZzz();
    const z = document.createElement('div'); z.className = 'zzz';
    z.textContent = ['z','z','Z'][Math.floor(Math.random()*3)];
    z.style.cssText = `left:${54+Math.random()*18}%;bottom:${currentStage===0?'30%':'50%'};font-size:${8+Math.random()*7}px;`;
    scene.appendChild(z); setTimeout(()=>z.remove(), 2000);
  }, 700);
}
function stopZzz() { clearInterval(zzzInterval); document.querySelectorAll('.zzz').forEach(z=>z.remove()); }

function onActivity() {
  if (currentStage < 0) return;
  setMood('happy', 3000);
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => setMood('sleep'), 12000);
}

function waterPlant() {
  const scene = document.querySelector('.scene');
  for (let i = 0; i < 9; i++) setTimeout(() => {
    const d = document.createElement('div'); d.className = 'drop';
    d.style.cssText = `left:${48+Math.random()*32}%;top:${6+Math.random()*20}%;animation-delay:${Math.random()*.15}s;`;
    scene.appendChild(d); setTimeout(()=>d.remove(), 1000);
  }, i*65);
  setTimeout(() => {
    const sp = document.createElement('div'); sp.className = 'splash'; sp.textContent = '💦';
    sp.style.cssText = `left:56%;bottom:40%;`; scene.appendChild(sp); setTimeout(()=>sp.remove(), 800);
  }, 350);
  setMood('watered', 4000);
  vscode.postMessage({ type: 'water' });
}

function updatePlant(data) {
  const stage = data.stage || 0;
  const lines = data.linesWritten || 0;
  const mins  = Math.floor((data.totalTime || 0) / 60);
  if (stage !== currentStage) {
    const first = currentStage === -1;
    currentStage = stage;
    renderPlant(stage, currentMood);
    if (stage === 4) setMood('love', 5000);
    else if (first) setMood('sleep');
    if (first) { clearTimeout(idleTimer); idleTimer = setTimeout(()=>setMood('sleep'), 12000); }
  }
  document.getElementById('stage-name').textContent = STAGE_NAMES[stage];
  document.getElementById('points').textContent = lines;
  document.getElementById('time').textContent = mins + ' min';
  document.getElementById('message').textContent = MESSAGES[stage];
  const prev = stage > 0 ? THRESHOLDS[stage-1] : 0;
  const next = THRESHOLDS[stage];
  const pct  = next === Infinity ? 100 : Math.min(100, Math.round(((lines-prev)/(next-prev))*100));
  document.getElementById('progress').style.width = pct + '%';
}

vscode.postMessage({ type: 'ready' });
window.addEventListener('message', e => {
  const msg = e.data;
  if (msg.type === 'update') updatePlant(msg.plantData);
  if (msg.type === 'wake' || msg.type === 'points') onActivity();
});
</script>
</body>
</html>
